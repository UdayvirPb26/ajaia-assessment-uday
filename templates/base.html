<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Collab Docs</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f7f7f8; }
    nav { background: #1a1a2e; color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: white; text-decoration: none; margin-left: 16px; }
    .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    .flash { background: #ffe8e8; color: #a33; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <nav>
    <strong>Collab Docs</strong>
    <div>
      {% if current_user.is_authenticated %}
        <span>{{ current_user.username }}</span>
        <a href="{{ url_for('auth.logout') }}">Logout</a>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
